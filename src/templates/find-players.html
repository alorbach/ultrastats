<!-- INCLUDE include_header.html --> 

<br>

<table width="100%" cellpadding="0" cellspacing="5" border="0" align="center" class="us-public-responsive-panel">
<tr>
	<td rowspan="2" width="10" valign="top" nowrap>&nbsp;</td>
	<td width="100%" valign="top" align="center">

		<form action="" method="GET">
		<table width="600" cellpadding="2" cellspacing="1" border="0" align="center" class="with_border_alternate us-public-responsive-panel">
		<tr>
			<td colspan="3" class="title" width="400" nowrap>{LN_SEARCH_TITLE}</td>
		</tr>
		</table>
		<table width="600" cellpadding="2" cellspacing="1" border="0" align="center" class="with_border us-public-search-table">
		<tr>
			<td class="cellmenu1"><label for="search-query"><b>{LN_SEARCH_STRING}</b></label></td>
			<td class="line1"><input type="text" id="search-query" name="search" value="{searchfor}" size="40" maxlength="32"></td>
			<td class="line0" rowspan="3" valign="middle" width="100" align="center"><input type="submit" value="Search"></td>
		</tr>
		<tr>
			<td class="cellmenu1"><label for="search-type"><b>{LN_SEARCH_BY}</b>:</label></td>
			<td class="line1">
				<select id="search-type" name="searchtype">
					<option value="1" {searchtype_selected_1}>{LN_SEARCH_PLAYERID}</option>
					<option value="3" {searchtype_selected_3}>{LN_SEARCH_PLAYERPBGUID}</option>
					<option value="2" {searchtype_selected_2}>{LN_SEARCH_PLAYERALIAS}</option>
				</select>
			</td>
		</tr>
		<tr>
			<td class="cellmenu1"><label for="ignore-color-codes"><b>{LN_SEARCH_IGNORECOLORCODES}</b></label></td>
			<td align="left" class="line0"><input type="checkbox" id="ignore-color-codes" name="ignorecolorcodes" value="yes" {IGNORECOLORCODES_CHECKED}></td>
		</tr>
		</table>
		</form>
	</td>
	<td rowspan="2" width="10" valign="top" nowrap>&nbsp;</td>
</tr>

<tr>
	<td width="100%" valign="top" align="center">
	<!-- IF playersfound="false" -->
	<br><br>
<div class="us-center">
	<div class="table_with_border_second ErrorMsg us-fixed-w-600" role="alert" aria-live="assertive">
		<div class="PriorityError">{LN_ERROR_DETAILS}</div>
		<p>{ERROR_DETAILS}</p>
		</div>
	<br><br>
</div>
<br><br>
	<!-- ENDIF playersfound="false" -->

	<!-- IF playersfound="true" -->
		<table width="600" cellpadding="0" cellspacing="1" border="0" align="center" class="with_border_alternate us-public-scroll-strip">
		<tr>
			<td colspan="2" class="title" width="400" nowrap>{LN_SEARCH_FOUND} '{searchfor}'</td>
		</tr>
		<tr>
			<td width="20" class="cellmenu1" align="center" nowrap><b>{LN_TOPPLAY_NUM}</b></td>
			<td width="100%" class="cellmenu1" align="center" nowrap><b>{LN_TOPPLAY_NAME}</b></td>
		</tr>

		<!-- BEGIN playersresults -->
		<tr>
			<td align="right" class="{cssclass}"><b>{Number}</b></td>
			<td class="{cssclass}"><a href="players-detail.php?id={PLAYERID}{additional_url}" title="{Alias}">{AliasAsHtml}</a></td>
		</tr>
		<!-- END playersresults -->

		</table>
	<!-- ENDIF playersfound="true" -->
	</td>
</tr>
</table>

<!-- INCLUDE include_footer.html -->
