<!-- INCLUDE admin/admin_header.html --> 

<!-- IF ISERROR="true" -->
<div class="us-center">
<h3 class="ErrorMsg" role="alert" aria-live="assertive">{ERROR_MSG}</h3>
</div>
<!-- ENDIF ISERROR="true" -->

<table width="300" cellpadding="0" cellspacing="0" border="0" align="center" class="with_border_alternate">
<tr>
	<td align="center" valign="top" class="title">{LN_ADMINLOGIN}</td>
</tr>
</table>
<table width="300" cellpadding="0" cellspacing="0" border="0" align="center" class="with_border">
<tr>
	<td align="center" class="tableBackground">
	<form action="" method="post">
		<table border="0" cellpadding="2" cellspacing="1">
		<tr>
			<td align="center"><label for="admin-login-uname"><b>{LN_USERNAME}</b></label></td>
		</tr>
		<tr>
			<td align="center">
			<input type="text" id="admin-login-uname" name="uname" size="14" maxlength="25" value="{uname}"></td>
		</tr>
		<tr>
			<td align="center"><label for="admin-login-pass"><b>{LN_PASSWORD}</b></label></td>
		</tr>
		<tr>
			<td align="center">
			<input type="password" id="admin-login-pass" name="pass" size="14" maxlength="20" value="{pass}"></td>
		</tr>
<!-- IF CANSAVECOOKIE="true" -->
		<tr>
			<td align="center">
			<input type="checkbox" id="admin-login-rememberme" disabled value="1" name="rememberme" /><label for="admin-login-rememberme">{LN_SAVEASCOOKIE}</label></td>
		</tr>
<!-- ENDIF CANSAVECOOKIE="true" -->
		<tr>
			<td align="center">
				<input type="submit" value="Anmelden">
				<input type="hidden" name="op" value="login">
				<input type="hidden" name="url" value="{REDIR_LOGIN}">

			</td>
		</tr>
		</table>
	</form>
	</td>
</tr>
</table>

<!-- INCLUDE admin/admin_footer.html -->
