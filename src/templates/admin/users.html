<!-- INCLUDE admin/admin_header.html --> 

<!-- IF ISERROR="true" -->
<div class="us-center">
<h3 class="ErrorMsg" role="alert" aria-live="assertive">{ERROR_MSG}</h3>
</div>
<!-- ENDIF ISERROR="true" -->

<table cellpadding="0" cellspacing="0" border="0" width="600" align="center" class="with_border_alternate us-admin-responsive-panel">
<tr>
	<td colspan="10" align="center" valign="top" class="title">
	<strong>{LN_USER_CENTER}</strong></td>
</tr>
</table>
<table cellpadding="0" cellspacing="0" border="0" width="600" align="center" class="with_border us-admin-responsive-panel">
<tr>
	<td align="center">

<!-- IF LISTUSERS="true" -->
		<table border="0" cellpadding="2" cellspacing="1" width="600" class="us-admin-scroll-strip">
		<tr>
			<td align="center" width="50" class="cellmenu1"><b>{LN_SERVERNUMBER}</b></td>
			<td align="center" width="300" class="cellmenu1"><b>{LN_USER_NAME}</b></td>
			<td align="center" width="200" class="cellmenu1"><b>{LN_SERVERACTION}</b></td>
		</tr>
		<!-- BEGIN USERS -->
		<tr>
			<td align="center" class="{cssclass}"><b>{ID}</b></td>
			<td align="center" class="{cssclass}"><a href="users.php?op=edit&id={ID}">{username}</a></td>
			<td align="center" class="{cssclass}">
				&nbsp;<a href="users.php?op=edit&id={ID}" aria-label="{LN_ADMINEDIT}"><img src="{BASEPATH}images/icons/edit.png" width="16" title="{LN_ADMINEDIT}" alt="" aria-hidden="true"></a>
				&nbsp;<a href="users.php?op=delete&id={ID}" class="us-confirm-nav" data-confirm-message="{LN_USER_WARNDELETEUSER}" aria-label="{LN_ADMINDELETE}"><img src="{BASEPATH}images/icons/delete.png" width="16" title="{LN_ADMINDELETE}" alt="" aria-hidden="true"></a>
			</td>
		</tr>
		<!-- END USERS -->
		<tr>
			<td align="center" colspan="3" class="tableBackground"><a href="users.php?op=add" aria-label="{LN_USER_ADD}"><img src="{BASEPATH}images/icons/add.png" title="{LN_ADMINADD} {LN_SERVER}" alt="" aria-hidden="true">&nbsp;{LN_USER_ADD}</a></td>
		</tr>
		</table>
<!-- ENDIF LISTUSERS="true" -->

<!-- IF ISEDITORNEWUSER="true" -->
		<form action="" method="post">
			<table border="0" cellpadding="1" cellspacing="1" class="us-admin-table-surface" width="100%">
			<tr>
				<td align="left" class="cellmenu1" width="150" nowrap><label for="admin-user-username"><b>{LN_USER_NAME}</b></label></td>
				<td align="right" class="line0" width="100%"><input type="text" id="admin-user-username" name="username" size="40" maxlength="64" value="{USERNAME}" required autocomplete="username"></td>
			</tr>
			<tr>
				<td align="left" class="cellmenu2" nowrap><label for="admin-user-password1"><b>{LN_USER_PASSWORD1}</b></label></td>
				<td align="right" class="line1"><input type="password" id="admin-user-password1" name="password1" size="40" maxlength="64" value="" autocomplete="new-password"></td>
			</tr>
			<tr>
				<td align="left" class="cellmenu2" nowrap><label for="admin-user-password2"><b>{LN_USER_PASSWORD2}</b></label></td>
				<td align="right" class="line0"><input type="password" id="admin-user-password2" name="password2" size="40" maxlength="64" value="" autocomplete="new-password"></td>
			</tr>
			<tr>
				<td align="center" colspan="2" class="tableBackground">
					<input type="submit" value="{USER_SENDBUTTON}">
					<input type="hidden" name="op" value="{USER_FORMACTION}">
					<input type="hidden" name="id" value="{USERID}">
				</td>
			</tr>
			</table>
		</form>
<!-- ENDIF ISEDITORNEWUSER="true" -->

		</td>
	</tr>
</table>

<!-- INCLUDE admin/admin_footer.html -->
