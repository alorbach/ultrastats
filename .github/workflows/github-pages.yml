# Build doc-site/ (MkDocs Material) and deploy to GitHub Pages on every push to main.
name: Publish GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r doc-site/requirements.txt

      - name: Prepare bundled docs (install + changelog from src/doc/en)
        run: python doc-site/prepare_docs.py
        env:
          GHP_REPO_URL: https://github.com/${{ github.repository }}

      - name: Build site
        run: python -m mkdocs build -f doc-site/mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc-site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
