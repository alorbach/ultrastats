name: Install wizard E2E

# Runs on main updates and PRs; uploads HTML screenshot gallery + Playwright report as artifacts.
# On failure (same-repo runs only): opens an issue with log excerpt + links to the run and artifact (screenshots are inside the zip).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  install-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Repo identity for issue step (skip forks)
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "issue_ok=${{ github.event.pull_request.head.repo.full_name == github.repository }}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run install wizard E2E (Docker Compose)
        shell: bash
        run: |
          set -o pipefail
          mkdir -p e2e
          docker compose -f docker/docker-compose.install-e2e.yml up --build --abort-on-container-exit --exit-code-from playwright 2>&1 | tee e2e/install-e2e-run.log

      - name: Upload install screenshot gallery and Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-reports
          path: |
            e2e/install-e2e-report
            e2e/playwright-report
            e2e/install-e2e-run.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Open issue on failure (screenshots in artifact)
        if: failure() && steps.meta.outputs.issue_ok == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## Install wizard E2E failed"
            echo
            echo "**Event:** ${{ github.event_name }} · **Ref:** \`${{ github.ref_name }}\` · **SHA:** \`${{ github.sha }}\`"
            echo
            echo "### Screenshots and HTML reports"
            echo "The workflow uploaded artifact **install-e2e-reports** (this run: [workflow summary](${RUN_URL}))."
            echo "Unzip it and open **install-e2e-report/index.html** for the step-by-step screenshot gallery, or **playwright-report/index.html** for the Playwright HTML report (attachments include the same PNGs)."
            echo
            echo "### Compose / test log (tail)"
            echo '```text'
            tail -n 200 e2e/install-e2e-run.log 2>/dev/null || echo "(no log file captured)"
            echo '```'
          } > /tmp/install-e2e-issue.md
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "CI: install-e2e failed (${{ github.ref_name }}, run ${{ github.run_id }})" \
            --body-file /tmp/install-e2e-issue.md
